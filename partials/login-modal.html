<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="loginModalLabel">Member Login</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<form id="loginForm" novalidate>
					<div class="mb-3">
						<label for="loginEmail" class="form-label">Email Address</label>
						<input type="email" class="form-control" id="loginEmail" name="loginEmail" required />
					</div>
					<div class="mb-3">
						<label for="loginPassword" class="form-label">Password</label>
						<input type="password" class="form-control" id="loginPassword" name="loginPassword" required />
					</div>
				</form>
			</div>
			<div class="modal-footer d-flex justify-content-between w-100">
				<div>
					<a href="signup.html" id="goToSignup" class="text-muted" style="font-size: 0.9em;">No account yet? Sign Up</a>
				</div>
				<div>
					<button type="submit" class="btn btn-primary" form="loginForm">Login</button>
				</div>
			</div>
		</div>
	</div>
</div>
